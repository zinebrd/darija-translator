<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Darija Translator</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div class="container">
    <h1>🌍 Darija Translator</h1>
    <div class="input-section">
      <label>English Text</label>
      <textarea id="inputText" placeholder="Enter text or select on page..."></textarea>
    </div>
    <button id="translateBtn">Translate</button>
    <div class="output-section">
      <label>Darija Translation</label>
      <div id="outputText" class="output-box">Translation will appear here...</div>
    </div>
    <button id="readAloudBtn" style="display:none">🔊 Read Aloud</button>
  </div>
  <script src="sidepanel.js"></script>
</body>
</html>
